env_name: CartPole-v1
algorithm: ppo
experiment_name: cartpole_llm_shaped

training:
  total_timesteps: 50000
  learning_rate: 0.0003
  batch_size: 64
  n_steps: 2048
  n_epochs: 10
  gamma: 0.99
  seed: 42
  log_interval: 5
  eval_interval: 10000
  eval_episodes: 10

llm:
  provider: ollama
  model: llama3
  base_url: http://localhost:11434
  temperature: 0.3
  max_tokens: 10
  timeout: 30

reward_shaping:
  enabled: true
  llm_weight: 0.3
  env_weight: 0.7
  prompt_template: cartpole
  cache_responses: true
  max_cache_size: 10000

output_dir: ./outputs
use_wandb: false
