name-template: 'v$RESOLVED_VERSION'
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
categories:
  - title: '🚀 Features'
    labels: ['feature', 'enhancement']
  - title: '🐛 Fixes'
    labels: ['bug', 'fix']
  - title: '🧪 Tests'
    labels: ['test']
  - title: '📚 Docs'
    labels: ['docs']
  - title: '🧰 CI/Infra'
    labels: ['ci', 'infrastructure']
  - title: '🔐 Security'
    labels: ['security']
exclude-labels:
  - 'skip-changelog'
template: |
  ## Changes
  $CHANGES
