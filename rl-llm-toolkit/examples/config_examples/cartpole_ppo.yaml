env_name: CartPole-v1
algorithm: ppo
experiment_name: cartpole_ppo_baseline

training:
  total_timesteps: 100000
  learning_rate: 0.0003
  batch_size: 64
  n_steps: 2048
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  use_gpu: true
  seed: 42
  log_interval: 10
  save_interval: 10000
  eval_interval: 10000
  eval_episodes: 10

output_dir: ./outputs
use_wandb: false
